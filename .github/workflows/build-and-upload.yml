name: Build and Upload

on:
  push:
    branches: [staging, main]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    env:
      HUSKY: "0"
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.NEXT_PUBLIC_API_URL || github.ref == 'refs/heads/staging' && secrets.NEXT_PUBLIC_API_URL_STAGING }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js application
        run: pnpm build

      - name: Archive production artifacts
        run: tar -czf anvila-build.tar.gz .next public package.json pnpm-lock.yaml

      - name: Upload production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anvila-build
          path: anvila-build.tar.gz
          retention-days: 1

      - name: Delete archive file
        run: rm -f anvila-build.tar.gz
