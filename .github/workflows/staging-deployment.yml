name: Staging Deployment
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Upload"]
    types:
      - completed
    branches:
      - staging
concurrency:
  group: deploy-frontend-staging
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/staging') ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: "staging"
      url: "https://staging.anvila.hng14.com"
    steps:
      - name: Resolve build run ID
        id: resolve-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger detected - looking up latest successful build run on staging..."
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow="build-and-upload.yml" \
              --branch=staging \
              --status=success \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "No successful 'Build and Upload' run found on staging. Push a commit to staging first."
              exit 1
            fi
            echo "Resolved run ID: $RUN_ID"
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          else
            echo "Automated trigger - using workflow_run ID: ${{ github.event.workflow_run.id }}"
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.resolve-run.outputs.run_id }}
          name: anvila-build
          path: .
      - name: Decode and create .env file
        run: |
          echo "${{ secrets.STAGING_ENV_BASE64 }}" | base64 -d > .env
      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,anvila-build.tar.gz"
          target: "~/anvila/frontend/staging"
      - name: Delete local artifacts
        run: rm -f anvila-build.tar.gz .env
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_RECOVER=1
            on_deploy_err() {
              set +e
              local code=$?
              echo "ERROR: deployment failed (exit ${code}) before completion; attempting PM2 rollback..."
              if [ "${DEPLOY_RECOVER}" = "1" ]; then
                pm2 resurrect || true
              fi
              trap - ERR
              exit "${code}"
            }
            trap 'on_deploy_err' ERR

            echo "=== Deploying Frontend Staging ==="
            cd ~/anvila/frontend/staging
            if pm2 describe frontend-staging > /dev/null 2>&1; then
              pm2 stop frontend-staging
            fi
            rm -rf .next
            tar -xzf anvila-build.tar.gz
            rm -f anvila-build.tar.gz
            rm -f pnpm-workspace.yaml pnpm-workspace.yml
            rm -f ../pnpm-workspace.yaml ../pnpm-workspace.yml
            rm -f ../../pnpm-workspace.yaml ../../pnpm-workspace.yml
            pnpm install
            pm2 save || true
            echo "=== Starting PM2 Process ==="
            if pm2 describe frontend-staging > /dev/null 2>&1; then
              pm2 restart frontend-staging --update-env
            else
              # First deploy: start using the ecosystem config for correct cwd/env.
              pm2 start ~/anvila/deploy/ecosystem.config.js --only frontend-staging
            fi
            echo "=== Running Health Check ==="
            MAX_RETRIES=15
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf "http://localhost:3000/" > /dev/null 2>&1; then
                echo "Health check passed after $((RETRY_COUNT + 1)) attempt(s)"
                DEPLOY_RECOVER=0
                trap - ERR
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt ${RETRY_COUNT}/${MAX_RETRIES} failed, retrying in 2s..."
              sleep 2
            done
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              DEPLOY_RECOVER=0
              trap - ERR
              echo "Health check failed. Dumping PM2 logs for diagnosis..."
              pm2 logs frontend-staging --lines 50 --nostream || true
              echo "Rolling back..."
              pm2 resurrect || true
              echo "Deployment FAILED - health check did not pass."
              exit 1
            fi
            echo "=== Frontend Staging Deployment Complete ==="
